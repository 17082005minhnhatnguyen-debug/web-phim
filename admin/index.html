<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Quản lý Phim</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="../assets/css/main.css">
    <link rel="stylesheet" href="../assets/css/admin.css">

    <style>
        body { background-color: #f4f6f9; color: #333; }
        .sidebar { min-height: 100vh; background-color: #212529; }
        .sidebar a {
            color: #c2c7d0;
            text-decoration: none;
            padding: 12px 15px;
            display: block;
            transition: 0.3s;
            border-radius: 5px;
            margin-bottom: 5px;
        }
        .sidebar a:hover,
        .sidebar a.active {
            background-color: #dc3545;
            color: #fff;
        }

        .admin-sidebar-link.logout {
            margin-top: 6px;
        }
    </style>
</head>
<body>
    <div class="d-flex">
        <aside class="sidebar p-3" style="width: 250px;">
            <!-- Logo -->
            <div class="text-center mb-4">
                <div class="d-inline-flex align-items-center gap-2">
                    <i class="fas fa-film text-danger"></i>
                    <span class="text-white fw-bold" style="letter-spacing: 0.5px;">ADMIN MOVIE</span>
                </div>
            </div>

            <!-- Menu -->
            <nav class="d-flex flex-column gap-2">
                <a href="#" class="admin-sidebar-link">
                    <i class="fas fa-tachometer-alt me-2"></i>
                    <span>Bảng điều khiển</span>
                </a>

                <a href="#" class="admin-sidebar-link active" aria-current="page">
                    <i class="fas fa-film me-2"></i>
                    <span>Quản lý Phim</span>
                </a>

                <a href="#" class="admin-sidebar-link">
                    <i class="fas fa-users me-2"></i>
                    <span>Quản lý Người dùng</span>
                </a>

                <a href="#" class="admin-sidebar-link">
                    <i class="fas fa-cog me-2"></i>
                    <span>Cài đặt</span>
                </a>

                <div class="mt-2 pt-2 border-top border-secondary">
                    <a href="../index.html" class="admin-sidebar-link logout" style="color: #dc3545;">
                        <i class="fas fa-sign-out-alt me-2"></i>
                        <span>Đăng xuất</span>
                    </a>
                </div>
            </nav>
        </aside>

        <div class="flex-grow-1 p-4">
            <div class="d-flex justify-content-between align-items-center mb-4 pb-3 border-bottom">
                
                    <h3 class="fw-bold m-0">Quản lý Phim</h3>
                    
                
                <a href="../index.html" class="btn btn-outline-dark btn-sm">
                    <i class="fas fa-external-link-alt me-1"></i> Xem giao diện Web
                </a>
            </div>

            <div class="bg-white p-4 rounded shadow-sm">
                <div class="d-flex align-items-center justify-content-between mb-3">
                    <h4 class="m-0">Danh sách phim</h4>
                    <button class="btn btn-danger btn-sm" data-bs-toggle="modal" data-bs-target="#addMovieModal">
                        <i class="fas fa-plus me-1"></i> Thêm mới
                    </button>
                </div>

                <div class="table-responsive">
                    <table class="table table-hover align-middle">
                        <thead>
                            <tr>
                                <th style="width: 70px;">ID</th>
                                <th style="width: 120px;">Thumbnail</th>
                                <th>Tên phim</th>
                                <th>Thể loại</th>
                                <th style="width: 90px;">Năm SX</th>
                                <th style="width: 150px;">Hành động</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td>1</td>
                                <td>
                                    <img src="https://via.placeholder.com/80x60/1a1a1a/e50914?text=1" alt="Movie 1" class="rounded border" style="width: 80px; height: 60px; object-fit: cover;">
                                </td>
                                <td>Stranger Things</td>
                                <td>Khoa học viễn tưởng</td>
                                <td>2019</td>
                                <td>
                                    <button class="btn btn-sm btn-outline-primary me-2" title="Sửa">
                                        <i class="fas fa-pen"></i>
                                    </button>
                                    <button class="btn btn-sm btn-outline-danger" title="Xóa">
                                        <i class="fas fa-trash"></i>
                                    </button>
                                </td>
                            </tr>

                            <tr>
                                <td>2</td>
                                <td>
                                    <img src="https://via.placeholder.com/80x60/1a1a1a/e50914?text=2" alt="Movie 2" class="rounded border" style="width: 80px; height: 60px; object-fit: cover;">
                                </td>
                                <td>Money Heist</td>
                                <td>Hình sự</td>
                                <td>2017</td>
                                <td>
                                    <button class="btn btn-sm btn-outline-primary me-2" title="Sửa">
                                        <i class="fas fa-pen"></i>
                                    </button>
                                    <button class="btn btn-sm btn-outline-danger" title="Xóa">
                                        <i class="fas fa-trash"></i>
                                    </button>
                                </td>
                            </tr>

                            <tr>
                                <td>3</td>
                                <td>
                                    <img src="https://via.placeholder.com/80x60/1a1a1a/e50914?text=3" alt="Movie 3" class="rounded border" style="width: 80px; height: 60px; object-fit: cover;">
                                </td>
                                <td>The Witcher</td>
                                <td>Fantasy</td>
                                <td>2019</td>
                                <td>
                                    <button class="btn btn-sm btn-outline-primary me-2" title="Sửa">
                                        <i class="fas fa-pen"></i>
                                    </button>
                                    <button class="btn btn-sm btn-outline-danger" title="Xóa">
                                        <i class="fas fa-trash"></i>
                                    </button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal: Add Movie -->
    <div class="modal fade" id="addMovieModal" tabindex="-1" aria-labelledby="addMovieModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="addMovieModalLabel">Thêm Phim Mới</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Đóng"></button>
                </div>

                <div class="modal-body">
                    <form id="form-add-movie">
                        <div class="mb-3">
                            <label for="movie-name" class="form-label">Tên phim</label>
                            <input type="text" class="form-control" id="movie-name" name="movieName" required>
                        </div>

                        <div class="mb-3">
                            <label for="movie-category" class="form-label">Thể loại</label>
                            <select class="form-select" id="movie-category" name="movieCategory" required>
                                <option value="Khoa học viễn tưởng">Khoa học viễn tưởng</option>
                                <option value="Hình sự">Hình sự</option>
                                <option value="Fantasy">Fantasy</option>
                                <option value="Tình cảm">Tình cảm</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label for="movie-year" class="form-label">Năm sản xuất</label>
                            <input type="number" class="form-control" id="movie-year" name="movieYear" min="1900" max="2100" required>
                        </div>

                        <div class="mb-3">
                            <label for="movie-poster" class="form-label">Link Poster</label>
                            <input type="text" class="form-control" id="movie-poster" name="moviePoster" placeholder="https://..." required>
                        </div>

                        <div class="mb-0">
                            <label for="movie-description" class="form-label">Mô tả</label>
                            <textarea class="form-control" id="movie-description" name="movieDescription" rows="4" required></textarea>
                        </div>
                    </form>
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Hủy</button>
                    <button type="submit" class="btn btn-danger" form="form-add-movie">Lưu lại</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/admin.js"></script>
</body>
</html>
