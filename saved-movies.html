<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Phim | Phim đã lưu</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/slick-carousel@1.8.1/slick/slick.css"/>
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/slick-carousel@1.8.1/slick/slick-theme.css"/>

    <link rel="stylesheet" href="assets/css/main.css">
    <link rel="stylesheet" href="assets/css/user.css">

    <style>
        .movie-saved-card {
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 14px;
            overflow: hidden;
            background: rgba(255,255,255,0.03);
            box-shadow: 0 12px 28px rgba(0,0,0,0.25);
        }
        .movie-saved-card__poster {
            position: relative;
            aspect-ratio: 2 / 3;
            background: linear-gradient(180deg, rgba(255,255,255,0.12), rgba(255,255,255,0.03));
        }
        .movie-saved-card__poster img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .movie-saved-card__trash-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 40px;
            height: 40px;
            border-radius: 999px;
            border: 1px solid rgba(255,255,255,0.15);
            background: rgba(220,53,69,0.95);
            display: grid;
            place-items: center;
            cursor: pointer;
            color: #fff;
        }
        .movie-saved-card__trash-btn:hover {
            filter: brightness(1.05);
        }
        .movie-saved-card__body {
            padding: 12px 12px 14px;
        }
        .movie-saved-card__title {
            font-weight: 700;
            line-height: 1.2;
        }
        .movie-saved-card__meta {
            color: rgba(255,255,255,0.65);
            font-size: 0.9rem;
        }
    </style>
</head>
<body class="bg-dark text-white">

<header>
    <nav class="navbar navbar-expand-lg navbar-dark bg-black shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold fs-3" href="index.html">
                <img src="assets/images/Logo.png" alt="Movie" class="me-2" style="height: 32px; width: auto;" onerror="this.style.display='none';" />MOVIE
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Trang chủ</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Phim Lẻ</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Phim Bộ</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="saved-movies.html">Phim đã lưu</a>
                    </li>
                </ul>

                <div class="d-flex align-items-center">
                    <a href="profile.html" class="btn btn-outline-light me-2">Tài khoản</a>
                    <a href="login.html" class="btn btn-danger">Đăng nhập</a>
                </div>
            </div>
        </div>
    </nav>
</header>

<main class="container py-4" style="min-height: 70vh;">
        <div class="mb-4">
            <h2 class="fw-bold mb-1"><i class="fas fa-heart text-danger me-2"></i>Danh sách phim đã lưu</h2>
            <div class="text-white-50">Những bộ phim bạn đã đánh dấu yêu thích để xem lại</div>
        </div>

        <div id="saved-movies-container" class="row g-4">
            </div>

        <div class="text-white-50 mt-5 text-center">
            © 2026 Movie Project
        </div>
    </main>

<footer class="bg-black text-center py-4 mt-5 text-secondary border-top border-dark">
    <div class="container">
        <p class="mb-0">&copy; 2026 Movie Project. Được thiết kế dành riêng cho Web Phim.</p>
    </div>
</footer>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/slick-carousel@1.8.1/slick/slick.min.js"></script>
<script src="assets/js/main.js"></script>
<script src="assets/js/slider.js"></script>

<script>
        document.addEventListener("DOMContentLoaded", function() {
            // 1. Khởi tạo dữ liệu mẫu ban đầu vào bộ nhớ nếu chưa có phim nào được lưu
            let savedMovies = JSON.parse(localStorage.getItem("db_saved_movies"));
            
            if (!savedMovies) {
                savedMovies = [
                    { id: 1, title: "Stranger Things", year: "2019", image: "assets/images/products/poster1.jpg" },
                    { id: 2, title: "Money Heist", year: "2017", image: "assets/images/products/illusion-design-money-heist-poster-min.jpg" },
                    { id: 3, title: "The Witcher", year: "2019", image: "assets/images/products/z7854927446163_2f09dcef814f7b0eabf8db66047eeabb.jpg" },
                    { id: 4, title: "Dark", year: "2017", image: "assets/images/products/review-phim-dark_elle-man-feature-2.jpg" }
                ];
                localStorage.setItem("db_saved_movies", JSON.stringify(savedMovies));
            }

            const container = document.getElementById("saved-movies-container");

            // 2. Hàm hiển thị danh sách phim ra màn hình
            function renderSavedMovies() {
                // Nếu không có phim nào trong danh sách
                if (savedMovies.length === 0) {
                    container.innerHTML = `
                        <div class="col-12 text-center py-5">
                            <i class="fas fa-film text-secondary fa-3x mb-3"></i>
                            <p class="text-white-50 fs-5">Hộp phim đã lưu của bạn đang trống.</p>
                            <a href="index.html" class="btn btn-danger mt-2"><i class="fas fa-arrow-left me-2"></i>Quay lại tìm phim</a>
                        </div>
                    `;
                    return;
                }

                container.innerHTML = ""; // Xóa nội dung cũ trước khi vẽ lại
                
                // Duyệt qua từng bộ phim để tạo cấu trúc thẻ HTML
                savedMovies.forEach(movie => {
                    const cardHTML = `
                        <div class="col-12 col-sm-6 col-md-4 col-lg-3">
                            <div class="trending-card h-100 d-flex flex-column justify-content-between">
                                <div class="position-relative">
                                    <div class="trending-card__poster">
                                        <img src="${movie.image}" alt="${movie.title}" class="w-100 h-100 object-fit-cover" onerror="this.style.display='none'; this.parentElement.style.background='linear-gradient(180deg, rgba(255,255,255,0.12), rgba(255,255,255,0.03))';" />
                                        <a href="movie-detail.html" class="trending-card__play">
                                            <i class="fas fa-play"></i>
                                        </a>
                                    </div>
                                    <div class="trending-card__body p-2">
                                        <div class="trending-card__title text-truncate">${movie.title}</div>
                                        <div class="trending-card__year">${movie.year}</div>
                                    </div>
                                </div>
                                <div class="p-2 pt-0">
                                    <button class="btn btn-outline-danger btn-sm w-100 btn-remove-movie" data-id="${movie.id}">
                                        <i class="fas fa-trash-alt me-1"></i> Xóa khỏi danh sách
                                    </button>
                                </div>
                            </div>
                        </div>
                    `;
                    container.innerHTML += cardHTML;
                });

                // Kích hoạt sự kiện xóa cho các nút vừa được tạo ra
                attachDeleteEvents();
            }

            // 3. Hàm xử lý logic khi người dùng bấm nút xóa phim
            function attachDeleteEvents() {
                const removeButtons = document.querySelectorAll(".btn-remove-movie");
                removeButtons.forEach(button => {
                    button.addEventListener("click", function() {
                        const movieId = parseInt(this.getAttribute("data-id"));
                        
                        // Lọc bỏ bộ phim được chọn ra khỏi mảng dữ liệu
                        savedMovies = savedMovies.filter(movie => movie.id !== movieId);
                        
                        // Cập nhật lại mảng mới vào localStorage
                        localStorage.setItem("db_saved_movies", JSON.stringify(savedMovies));
                        
                        // Vẽ lại giao diện danh sách phim mới
                        renderSavedMovies();
                    });
                });
            }

            // Chạy hàm hiển thị ngay khi tải trang
            renderSavedMovies();
        });
    </script>
</body>
</html>
