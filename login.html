<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Đăng nhập / Đăng ký</title>

  <!-- Bootstrap 5 CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

  <!-- Font Awesome -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet" />

  <!-- Project CSS -->
  <link rel="stylesheet" href="assets/css/main.css" />


    
    
</head>
<body>
  <main class="login-page">
    <section class="login-card" aria-label="Trang đăng nhập / đăng ký">
      <div class="header">
      <div class="brand">
        <div class="logo" style="display:flex; align-items:center; justify-content:center; overflow:hidden;">
          <img src="assets/images/Logo.png" alt="Movie" style="width: 22px; height: 22px; object-fit:contain;" onerror="this.style.display='none';" />
        </div>
        <div>
            <div style="font-size:1.1rem;">Xem phim trực tuyến</div>
            <div style="font-size:0.9rem; color: rgba(255,255,255,0.7);"></div>
          </div>
        </div>
      </div>

      <div class="form-section">
        <div class="d-flex justify-content-between align-items-center login-tabs mb-3">
          <div class="d-flex gap-2 w-100">
            <button id="tab-login" class="tab-btn active" type="button" aria-controls="form-login" aria-selected="true">
              <i class="fa-solid fa-right-to-bracket me-2"></i>Đăng nhập
            </button>
            <button id="tab-register" class="tab-btn" type="button" aria-controls="form-register" aria-selected="false">
              <i class="fa-solid fa-user-plus me-2"></i>Đăng ký
            </button>
          </div>
        </div>

        <!-- Đăng nhập -->
        <form id="form-login" class="form-toggle active" novalidate>
          <div class="mb-3">
            <label for="login-email" class="form-label">Email</label>
            <input class="form-control" id="login-email" name="email" type="email" placeholder="name@example.com" autocomplete="email" />
            <div class="validation-error" id="error-login-email"></div>
          </div>

          <div class="mb-3">
            <label for="login-password" class="form-label">Mật khẩu</label>
            <input class="form-control" id="login-password" name="password" type="password" placeholder="••••••" autocomplete="current-password" />
            <div class="validation-error" id="error-login-password"></div>
          </div>

          <button class="btn btn-net w-100 py-2" type="submit">
            <i class="fa-solid fa-arrow-right-to-bracket me-2"></i>Đăng nhập
          </button>

          <div class="form-footer text-center mt-3 small">
            <span style="color: rgba(255,255,255,0.65);">Chưa có tài khoản?</span>
            <a href="#" id="link-go-register" class="ms-2">Đăng ký ngay</a>
          </div>
        </form>

        <!-- Đăng ký -->
        <form id="form-register" class="form-toggle" novalidate>
          <div class="mb-3">
            <label for="register-fullname" class="form-label">Họ tên</label>
            <input class="form-control" id="register-fullname" name="fullname" type="text" placeholder="Nguyễn Văn A" autocomplete="name" />
            <div class="validation-error" id="error-register-fullname"></div>
          </div>

          <div class="mb-3">
            <label for="register-email" class="form-label">Email</label>
            <input class="form-control" id="register-email" name="email" type="email" placeholder="name@example.com" autocomplete="email" />
            <div class="validation-error" id="error-register-email"></div>
          </div>

          <div class="mb-3">
            <label for="register-password" class="form-label">Mật khẩu</label>
            <input class="form-control" id="register-password" name="password" type="password" placeholder="Tối thiểu 6 ký tự" autocomplete="new-password" />
            <div class="validation-error" id="error-register-password"></div>
          </div>

          <div class="mb-3">
            <label for="register-confirm-password" class="form-label">Nhập lại mật khẩu</label>
            <input class="form-control" id="register-confirm-password" name="confirmPassword" type="password" placeholder="Nhập lại mật khẩu" autocomplete="new-password" />
            <div class="validation-error" id="error-register-confirm-password"></div>
          </div>

          <button class="btn btn-net w-100 py-2" type="submit">
            <i class="fa-solid fa-user-plus me-2"></i>Đăng ký
          </button>

          <div class="form-footer text-center mt-3 small">
            <span style="color: rgba(255,255,255,0.65);">Đã có tài khoản?</span>
            <a href="#" id="link-go-login" class="ms-2">Đăng nhập</a>
          </div>
        </form>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script defer src="assets/js/validation.js"></script>

  <script>
    // Toggle login/register UI (Vanilla JS)
    (function () {
      const tabLogin = document.getElementById('tab-login');
      const tabRegister = document.getElementById('tab-register');
      const formLogin = document.getElementById('form-login');
      const formRegister = document.getElementById('form-register');
      const linkGoRegister = document.getElementById('link-go-register');
      const linkGoLogin = document.getElementById('link-go-login');

      function setActive(which) {
        const isLogin = which === 'login';

        tabLogin.classList.toggle('active', isLogin);
        tabRegister.classList.toggle('active', !isLogin);

        tabLogin.setAttribute('aria-selected', String(isLogin));
        tabRegister.setAttribute('aria-selected', String(!isLogin));

        formLogin.classList.toggle('active', isLogin);
        formRegister.classList.toggle('active', !isLogin);
      }

      tabLogin?.addEventListener('click', () => setActive('login'));
      tabRegister?.addEventListener('click', () => setActive('register'));
      linkGoRegister?.addEventListener('click', (e) => { e.preventDefault(); setActive('register'); });
      linkGoLogin?.addEventListener('click', (e) => { e.preventDefault(); setActive('login'); });
    })();
  </script>
</body>
</html>
